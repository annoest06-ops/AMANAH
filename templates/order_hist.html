<html>

    <body>

        <hr>
        <b>filter by date</b>
        <form action="/order_history" method="POST">
            <label>Date</label>
            <input type="date" name="date">
            <button type="submit">Search</button>
        </form>
        <hr>

        <table border="1">

            <tr>
                <th>Date</th>
                <th>Details</th>
                <th>Time</th>
                <th>Guard</th>
            </tr>
            {%if cools%}
            {%for cool in cools%}

            <tr>

                <td>{{cool.date}}</td>
                <td>{{cool.details}}</td>
                <td>{{cool.time}}</td>
                <td>{{cool.sign}}</td>
                
            </tr>

            {%endfor%}
            {%else%} 
            <p>No records found</p>
            {%endif%}
        </table>
    </body>
</html>
