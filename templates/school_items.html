<!DOCTYPE html>
<html>

   <body>

    <form action="/school_items" method="POST">
        <fieldset>

            <legend align="center">School Properties registration</legend><br><br>

            <label>Date:</label>
            <input type="date" name="date" required><br><br>

            <label>Name:</label>
            <input type="text" name="name" required><br><br>

            <label>Items:</label>
            <textarea name="item" required></textarea><br><br>

            <label>Status:(Item is get)</label>
            <select name="status">
                <option>---------</option>
                <option value="Inside">Inside</option>
                <option value="Outside">Outside</option>
            </select><br><br>

            <label>Time:</label>
            <input type="time" name="time" required><br><br>

            <label>Confirm:</label>
            <input type="checkbox" value="mndimi" name="confirm" required><br><br>

            <button type="submit">Allow</button>

        </fieldset>
    </form>
   </body>
</html>
