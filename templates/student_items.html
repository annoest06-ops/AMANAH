<!DOCTYPE html>
<html>
    <body>


        <form action="/student_items" method="POST">
            <fieldset>
                <legend>Student Items Registration</legend><br><br>
                
                <label>Date:</label>
                <input type="date" name="date" required><br><br>

                <label>Name:</label>
                <input type="text" name="name" required><br><br>

                <label>Form:</label>
                <input type="text" name="form" required><br><br>

                <label>Items:</label>
                <textarea name="items" required></textarea><br><br>

                <label>Issued to:</label>
                <input type="text" name="issued" readonly value="Guard"><br><br>

                <label>Confirm:</label>
                <input type="checkbox" name="confirm" value="mndimi" required><br><br>

                <button type="submit">Save</button>


            </fieldset>
        </form>
    </body>
</html>
